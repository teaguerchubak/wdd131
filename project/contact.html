    <main class="contact-main">

        <h2>Contact Teaguer Chubak</h2>

        <form method="get" action="submission.html" class="form">
            <fieldset>
                <legend>Contact Info</legend>
                <label>Name* <input type="text" id="name" name="name" required></label>
                <label>Email* <input type="email" id="email" name="email" required></label>
                <label><input type="checkbox" id="durability" name="durability" value="yes"> Sign up for Teaguer's newsletter!</label>
            </fieldset>
            <fieldset>
                <legend>Your Message</legend>
                <label>Subject* 
                    <select id="subject" name="subject" required>
                        <option value="" disabled selected>Select a Subject ...</option>
                        <option value="Booking">Booking</option>
                        <option value="Streaming">Streaming Music</option>
                        <option value="Merch">Merch</option>
                        <option value="Other">Other</option>
                    </select>
                </label>

                <label class="writt">Message*<textarea id="review" name="review" required></textarea></label>

                <input type="submit" value="Send Message">
            </fieldset>
        </form>

    </main>
